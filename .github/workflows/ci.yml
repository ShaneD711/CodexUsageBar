name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Validate shell scripts
        run: bash -n script/build_and_run.sh script/package_release.sh script/release_check.sh

      - name: Run tests
        run: swift test

      - name: Build arm64 release
        run: swift build --configuration release --arch arm64
